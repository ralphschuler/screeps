pinnedPackages:
  screeps: 4.3.0
  screepsmod-auth: 2.8.2
  screepsmod-admin-utils: 1.36.0
  screepsmod-mongo: 2.13.0

mods:
  - screepsmod-auth
  - screepsmod-admin-utils
  - screepsmod-mongo
  - ../screepsmod-testing

serverConfig:
  tickRate: 20
  socketUpdateRate: 20
  shardName: shard0

cronjobs: {}

launcherOptions:
  autoUpdate: false
  logConsole: true

screepsmod:
  testing:
    autoRun: true
    testInterval: 50
    outputFormat: all
    outputDir: /screeps/artifacts
    persistencePath: /screeps/artifacts/screepsmod-testing-history.json
    historySize: 20
    runtimeWarmupTicks: 100
    scenarios:
      - default-bootstrap
      - construction-economy
      - remote-mining
      - defense-hostile
      - defense-hard-invader
      - alliance-safety
    testFiles:
      - /workspace/packages/screepsmod-testing/dist/suites/ci-state-tests.js
