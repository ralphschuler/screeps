pinnedPackages:
  screeps: 4.3.0
  screepsmod-auth: 2.8.2
  screepsmod-admin-utils: 1.36.0
  screepsmod-bots: 0.1.1
  screepsmod-mongo: 2.13.0

mods:
  - screepsmod-auth
  - screepsmod-admin-utils
  - screepsmod-mongo
  - screepsmod-bots
  - ../screepsmod-testing

bots:
  simplebot: simplebot

serverConfig:
  tickRate: 100
  socketUpdateRate: 100
  shardName: shard0

launcherOptions:
  autoUpdate: false
  logConsole: true

screepsmod:
  testing:
    autoRun: true
    testInterval: 500
    outputFormat: all
    outputDir: /screeps/artifacts
    persistencePath: /screeps/artifacts/screepsmod-testing-history.json
    historySize: 20
    testFiles:
      - /workspace/packages/screepsmod-testing/dist/suites/ci-state-tests.js
