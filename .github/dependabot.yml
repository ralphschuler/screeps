version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Root package dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "typescript"
          - "ts-node"
          - "mocha"
          - "chai"
          - "eslint*"
          - "prettier"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "typescript"
          - "ts-node"
          - "mocha"
          - "chai"
          - "eslint*"
          - "prettier"
    labels:
      - "dependencies"
      - "automated"

  # Docker images
  - package-ecosystem: "docker"
    directory: "/packages/screeps-graphite-exporter"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1

  - package-ecosystem: "docker"
    directory: "/packages/screeps-loki-exporter"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
