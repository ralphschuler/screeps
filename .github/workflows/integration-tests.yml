name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/screeps-bot/src/**'
      - 'packages/screeps-bot/package*.json'
      - 'packages/@ralphschuler/**'
      - 'packages/screeps-*/**'
      - 'packages/screeps-server/**'
      - 'packages/screepsmod-testing/**'
      - '.github/workflows/integration-tests.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'packages/screeps-bot/src/**'
      - 'packages/screeps-bot/package*.json'
      - 'packages/@ralphschuler/**'
      - 'packages/screeps-*/**'
      - 'packages/screeps-server/**'
      - 'packages/screepsmod-testing/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  private-server-smoke:
    name: Real private-server smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build framework, bot, and testing mod
        run: |
          npm run build
          npm run build:mod
        timeout-minutes: 15

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run private-server smoke test
        working-directory: packages/screeps-server
        run: node scripts/run-private-server-test.js --mode=smoke --durationMinutes=15 --maxTicks=10000 --project=screeps-smoke-${{ github.run_id }}
        timeout-minutes: 45

      - name: Upload smoke summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screeps-smoke-summary
          path: |
            packages/screeps-server/artifacts/smoke/summary.json
            packages/screeps-server/artifacts/smoke/summary.md
            packages/screeps-server/artifacts/smoke/harness.log
            packages/screeps-server/artifacts/smoke/scenario-*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload raw smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screeps-smoke-raw-logs
          path: packages/screeps-server/artifacts/smoke/docker.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Cleanup Docker
        if: always()
        working-directory: packages/screeps-server
        run: docker compose -f docker-compose.ci.yml -p screeps-smoke-${{ github.run_id }} down -v --remove-orphans || true
