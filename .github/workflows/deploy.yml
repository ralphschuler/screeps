name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:

# Prevent multiple simultaneous deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ matrix.target.environment }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ matrix.target.environment }}
    # Only the official production target gates the workflow result. Optional
    # community/simulation targets are useful when configured, but DNS/auth
    # outages there must not mark a successful screeps.com upload as failed.
    continue-on-error: ${{ matrix.target.required != true }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - environment: sim.screeps.com
            hostname: screeps.com
            required: false
          - environment: season.screeps.com
            hostname: season.screeps.com
            required: false
          - environment: ptr.screeps.com
            hostname: ptr.screeps.com
            required: false
          - environment: screeps.com
            hostname: screeps.com
            required: true
          - environment: screeps.nyphon.de
            hostname: screeps.nyphon.de
            required: false
          - environment: screeps.newbieland.net
            hostname: screeps.newbieland.net
            required: false
    env:
      CI: true
      SCREEPS_USER: ${{ vars.SCREEPS_USER }}
      SCREEPS_PROTOCOL: ${{ vars.SCREEPS_PROTOCOL }}
      SCREEPS_HOSTNAME: ${{ vars.SCREEPS_HOSTNAME || matrix.target.hostname }}
      SCREEPS_PORT: ${{ vars.SCREEPS_PORT }}
      SCREEPS_PATH: ${{ vars.SCREEPS_PATH }}
      SCREEPS_BRANCH: ${{ vars.SCREEPS_BRANCH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Deploy preflight
        run: npm run deploy:preflight

      - name: Set up Docker Buildx for production smoke
        if: ${{ matrix.target.required == true }}
        uses: docker/setup-buildx-action@v3

      - name: Run production private-server smoke
        if: ${{ matrix.target.required == true }}
        working-directory: packages/screeps-server
        run: node scripts/run-private-server-test.js --mode=smoke --durationMinutes=15 --maxTicks=3000 --project=screeps-deploy-smoke-${{ github.run_id }}
        timeout-minutes: 45

      - name: Upload production smoke summary
        if: ${{ always() && matrix.target.required == true }}
        uses: actions/upload-artifact@v6
        with:
          name: screeps-deploy-smoke-summary
          path: |
            packages/screeps-server/artifacts/smoke/summary.json
            packages/screeps-server/artifacts/smoke/summary.md
            packages/screeps-server/artifacts/smoke/harness.log
            packages/screeps-server/artifacts/smoke/scenario-*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload production smoke raw logs
        if: ${{ always() && matrix.target.required == true }}
        uses: actions/upload-artifact@v6
        with:
          name: screeps-deploy-smoke-raw-logs
          path: packages/screeps-server/artifacts/smoke/docker.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Cleanup production smoke Docker
        if: ${{ always() && matrix.target.required == true }}
        working-directory: packages/screeps-server
        run: docker compose -f docker-compose.ci.yml -p screeps-deploy-smoke-${{ github.run_id }} down -v --remove-orphans || true

      # Keep deploy credentials scoped to the upload step so dependency installation,
      # validation, private-server smoke, and package lifecycle scripts cannot read Screeps secrets.
      - name: Push to Screeps
        env:
          SCREEPS_PASS: ${{ secrets.SCREEPS_PASS }}
          SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}
        run: npm run push
