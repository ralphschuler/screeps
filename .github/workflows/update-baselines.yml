name: Update Performance Baselines

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to validate baseline for'
        required: false
        default: 'main'
        type: choice
        options: [main, develop]

concurrency:
  group: update-baselines
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  validate-baseline-inputs:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}

    steps:
      - name: Checkout ${{ env.TARGET_BRANCH }} branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build all packages and testing mod
        run: |
          npm run build
          npm run build:mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate private-server smoke before baseline updates
        working-directory: packages/screeps-server
        run: node scripts/run-private-server-test.js --mode=smoke --durationMinutes=15 --maxTicks=10000 --project=screeps-baseline-smoke-${{ github.run_id }}
        timeout-minutes: 45

      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: baseline-validation-summary
          path: |
            packages/screeps-server/artifacts/smoke/summary.json
            packages/screeps-server/artifacts/smoke/summary.md
            packages/screeps-server/artifacts/smoke/scenario-*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Cleanup Docker
        if: always()
        working-directory: packages/screeps-server
        run: docker compose -f docker-compose.ci.yml -p screeps-baseline-smoke-${{ github.run_id }} down -v --remove-orphans || true
