name: Continuous Integration

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-typecheck:
    name: Build and Typecheck
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build framework and bot
        run: npm run build

      - name: Check bot bundle drift
        run: npm run check:bot-bundle-drift

      - name: Typecheck workspaces
        run: npm run typecheck

  bot-and-script-tests:
    name: Bot and Script Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build framework and bot
        run: npm run build

      - name: Run script tests
        run: npm run test:scripts

      - name: Run main bot tests
        run: npm test -w screeps-typescript-starter

  dependency-sync:
    name: Dependency Sync Check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check framework dependency synchronization
        run: npm run sync:deps:check

      - name: Check publish package dependency normalization
        run: npm run publish:framework:check

      - name: Check source package import boundaries
        run: npm run check:no-deep-dist-imports
